<!DOCTYPE html>
<html>
<head>
    <title>Thai Lottery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        input { padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Thai Lottery Search</h1>
    <input type="text" id="token" placeholder="Enter Token Number">
    <button onclick="check()">Search</button>
    <h3 id="res"></h3>

    <script>
        function check() {
            let t = document.getElementById('token').value;
            fetch('/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token: t})
            })
            .then(r => r.json())
            .then(d => { document.getElementById('res').innerText = d.result; });
        }
    </script>
</body>
</html>
